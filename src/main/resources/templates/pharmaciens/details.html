<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Détails du Pharmacien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
        <div th:replace="~{fragments/header :: header}"></div>

<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-capsule"></i> Profil du Pharmacien</h4>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <img th:src="${pharmacien.user != null && pharmacien.user.photo != null} ? @{'/photos/' + ${pharmacien.user.photo}} : @{'/photos/default.png'}" 
                                     class="rounded-circle img-thumbnail shadow-sm" 
                                     style="width: 180px; height: 180px; object-fit: cover;" alt="Photo">
                            </div>
                            
                            <div class="col-md-8">
                                <h3 class="text-success fw-bold" th:text="${pharmacien.nom + ' ' + pharmacien.prenom}">Nom Prénom</h3>
                                <p class="badge bg-success text-white fs-6">Service Pharmacie</p>
                                
                                <table class="table mt-3">
                                    <tr>
                                        <th style="width: 40%"><i class="bi bi-telephone text-muted me-2"></i> Téléphone :</th>
                                        <td th:text="${pharmacien.telephone}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-envelope text-muted me-2"></i> Email :</th>
                                        <td th:text="${pharmacien.user != null ? pharmacien.user.email : 'N/A'}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-person-check text-muted me-2"></i> Identifiant :</th>
                                        <td th:text="${pharmacien.user != null ? pharmacien.user.username : 'N/A'}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-shield-lock text-muted me-2"></i> Statut :</th>
                                        <td>
                                            <span th:if="${pharmacien.user != null}" 
                                                  th:class="${pharmacien.user.active ? 'badge bg-success' : 'badge bg-danger'}"
                                                  th:text="${pharmacien.user.active ? 'Actif' : 'Inactif'}"></span>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-light d-flex justify-content-between">
                        <a th:href="@{/admin/pharmaciens}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <a th:href="@{/admin/editPharmacien(id=${pharmacien.id})}" class="btn btn-warning">
                            <i class="bi bi-pencil"></i> Modifier
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
