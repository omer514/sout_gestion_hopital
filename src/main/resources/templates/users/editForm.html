<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier l'Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning py-3">
                        <h4 class="mb-0 text-dark"><i class="fas fa-user-edit"></i> Modification de l'agent : <span th:text="${appUser.username}"></span></h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form th:action="@{/admin/updateUser}" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="username" th:value="${appUser.username}">

                            <div class="row">
                                <div class="col-md-4 text-center border-end">
                                    <label class="form-label fw-bold d-block">Photo Actuelle</label>
                                    <img th:src="${appUser.photo != null} ? @{'/photos/' + ${appUser.photo}} : @{'/photos/default.png'}" 
                                         class="rounded-circle img-thumbnail mb-3" 
                                         style="width: 120px; height: 120px; object-fit: cover;">
                                    
                                    <div class="mb-3">
                                        <label class="btn btn-outline-primary btn-sm">
                                            Changer la photo
                                            <input type="file" name="imageFile" hidden accept="image/*">
                                        </label>
                                        <small class="d-block text-muted mt-1">Format: JPG, PNG</small>
                                    </div>
                                </div>

                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Adresse Email</label>
                                        <input type="email" name="email" class="form-control" th:value="${appUser.email}" required>
                                    </div>

                                    <div class="mb-3 p-3 bg-light border rounded">
                                        <label class="form-label text-danger fw-bold"><i class="fas fa-key"></i> Nouveau mot de passe</label>
                                        <input type="password" name="newPassword" class="form-control" placeholder="Laisser vide pour ne pas changer">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Rôles attribués</label>
                                        <div class="d-flex flex-wrap gap-2">
                                            <div th:each="r : ${allRoles}" class="form-check border p-2 rounded">
                                                <input class="form-check-input" type="checkbox" name="roles" 
                                                       th:id="${r.roleName}" th:value="${r.roleName}"
                                                       th:checked="${appUser.roles.contains(r)}">
                                                <label class="form-check-label" th:for="${r.roleName}" th:text="${r.roleName}"></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card-footer bg-white border-0 d-flex justify-content-between mt-4">
                                <a th:href="@{/admin/users}" class="btn btn-secondary">Annuler</a>
                                <button type="submit" class="btn btn-warning fw-bold">Appliquer les modifications</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
