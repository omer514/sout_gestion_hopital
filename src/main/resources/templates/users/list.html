<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion du Personnel - GestHopital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .user-photo {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #dee2e6;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="fas fa-user-shield"></i> Gestion du Personnel</h4>
                <a th:href="@{/admin/formUser}" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-plus-circle"></i> Ajouter un Agent/Médecin
                </a>
            </div>
            
            <div class="card-body">
                <form th:action="@{/admin/users}" method="get" class="mb-4">
                    <div class="input-group w-50">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Rechercher un agent...">
                        <button class="btn btn-dark" type="submit"><i class="fas fa-search"></i></button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Photo</th>
                                <th>Username</th>
                                <th>Rôles</th>
                                <th>Statut</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${listUsers}">
                                <td>
                                    <img th:src="${u.photo != null} ? @{'/photos/' + ${u.photo}} : @{'/photos/default.png'}" 
                                         class="user-photo shadow-sm" alt="Profile">
                                </td>
                                <td>
                                    <span class="fw-bold" th:text="${u.username}"></span>
                                </td>
                                <td>
                                    <span th:each="r : ${u.roles}" 
                                          class="badge rounded-pill bg-info text-dark me-1" 
                                          th:text="${r.roleName}"></span>
                                </td>
                                <td>
                                    <span th:class="${u.active ? 'badge bg-success' : 'badge bg-danger'}" 
                                          th:text="${u.active ? 'Actif' : 'Suspendu'}"></span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/userDetails(username=${u.username})}" class="btn btn-info btn-sm text-white" title="Détails">
                                        <i class="fas fa-eye"></i>
                                    </a>

                                    <a th:href="@{/admin/editUser(username=${u.username})}" class="btn btn-warning btn-sm" title="Modifier">
                                        <i class="fas fa-edit"></i>
                                    </a>

                                    <a th:href="@{/admin/toggleUserStatus(username=${u.username} , keyword=${keyword}, page=${currentPage})}" 
                                       th:class="${u.active} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                       title="Changer le statut">
                                        <i th:class="${u.active} ? 'fas fa-lock' : 'fas fa-lock-open'"></i>
                                        <span th:text="${u.active} ? 'Désactiver' : 'Activer'"></span>
                                    </a>

                                    <a onclick="return confirm('Voulez-vous vraiment supprimer ce compte agent ?')" 
                                       class="btn btn-danger btn-sm"
                                       th:href="@{/admin/deleteUser(username=${u.username})}">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${pages != null}">
                    <ul class="pagination justify-content-center mt-3">
                        <li th:each="page,status : ${pages}" class="page-item">
                            <a th:class="${status.index == currentPage ? 'page-link active' : 'page-link'}"
                               th:href="@{/admin/users(page=${status.index}, keyword=${keyword})}"
                               th:text="${status.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
