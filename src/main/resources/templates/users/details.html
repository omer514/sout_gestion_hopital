<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails de l'Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-img-big {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border: 5px solid #fff;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-dark text-white p-3">
                        <h3 class="mb-0"><i class="fas fa-id-card"></i> Fiche Informations Agent</h3>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <img th:src="${user.photo != null} ? @{'/photos/' + ${user.photo}} : @{'/photos/default.png'}" 
                                     class="profile-img-big rounded-circle shadow" alt="Photo">
                            </div>
                            <div class="col-md-8">
                                <h2 class="text-primary mb-3" th:text="${user.username}"></h2>
                                <hr>
                                <p><strong><i class="fas fa-envelope text-secondary"></i> Email :</strong> <span th:text="${user.email}"></span></p>
                                <p><strong><i class="fas fa-user-tag text-secondary"></i> Rôles :</strong> 
                                    <span th:each="r : ${user.roles}" class="badge bg-info text-dark me-1" th:text="${r.roleName}"></span>
                                </p>
                                <p><strong><i class="fas fa-info-circle text-secondary"></i> État du compte :</strong> 
                                    <span th:class="${user.active ? 'badge bg-success' : 'badge bg-danger'}" 
                                          th:text="${user.active ? 'Actif' : 'Suspendu'}"></span>
                                </p>
                                <p><strong><i class="fas fa-fingerprint text-secondary"></i> ID Unique :</strong> <small class="text-muted" th:text="${user.userId}"></small></p>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white text-end">
                        <a th:href="@{/admin/users}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Retour à la liste
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
