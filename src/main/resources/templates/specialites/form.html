<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Spécialité</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

        <div th:replace="~{fragments/header :: header}"></div>

<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Nouvelle Spécialité</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/saveSpecialite}" method="post">
                            
                            <div class="mb-3">
                                <label for="nom" class="form-label fw-bold">Nom de la spécialité</label>
                                <input type="text" id="nom" name="nom" class="form-control" 
                                       placeholder="Ex: Cardiologie, Pédiatrie..." required
                                       th:value="${specialite.nom}">
                                <div class="form-text">Le nom doit être unique.</div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Description</label>
                                <textarea id="description" name="description" class="form-control" 
                                          rows="4" placeholder="Décrivez brièvement cette spécialité..."
                                          th:text="${specialite.description}"></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/specialites}" class="btn btn-secondary">
                                    Annuler
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-lg"></i> Enregistrer
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
