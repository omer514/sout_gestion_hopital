<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
     >
<head>
    <meta charset="UTF-8">
    <title>Gestion des Spécialités</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

        <div th:replace="~{fragments/header :: header}"></div>

<div layout:fragment="content">
    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="bi bi-hospital"></i> Liste des Spécialités</h4>
                <a class="btn btn-light btn-sm" th:href="@{/admin/formSpecialite}">
                    <i class="bi bi-plus-lg"></i> Ajouter une Spécialité
                </a>
            </div>
            <div class="card-body">
                <form method="get" th:action="@{/admin/specialites}" class="row g-3 mb-4">
                    <div class="col-auto">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" class="form-control" 
                                   placeholder="Nom de la spécialité..." th:value="${keyword}">
                            <button class="btn btn-primary" type="submit">Rechercher</button>
                        </div>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nom de la Spécialité</th>
                            <th>Description</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${listSpecialites}">
                            <td th:text="${s.id}" class="text-muted"></td>
                            <td><span class="badge bg-info text-dark" th:text="${s.nom}"></span></td>
                            <td th:text="${s.description}"></td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a class="btn btn-outline-warning btn-sm" 
                                       th:href="@{/admin/editSpecialite(id=${s.id})}">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <a onclick="return confirm('Attention : Cette action est irréversible. Continuer ?')" 
                                       class="btn btn-outline-danger btn-sm" 
                                       th:href="@{/admin/deleteSpecialite(id=${s.id}, page=${currentPage}, keyword=${keyword})}">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listSpecialites)}">
                            <td colspan="4" class="text-center text-muted p-4">Aucune spécialité trouvée.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav aria-label="Page navigation" class="mt-3">
                    <ul class="pagination justify-content-center">
                        <li th:each="v,itemStatus : ${pages}" class="page-item" 
                            th:classappend="${currentPage==itemStatus.index ? 'active' : ''}">
                            <a class="page-link" 
                               th:href="@{/admin/specialites(page=${itemStatus.index}, keyword=${keyword})}"
                               th:text="${itemStatus.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
