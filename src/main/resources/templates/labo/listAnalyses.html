<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Worklist Laboratoire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .card-counter { border: none; border-radius: 10px; transition: 0.3s; }
        .card-counter:hover { transform: translateY(-5px); }
        .icon-lg { font-size: 3rem; opacity: 0.3; }
        .badge-examen { font-size: 0.85rem; margin-right: 4px; }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container mt-4">
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-counter bg-primary text-white shadow">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase fw-bold small">Total Analyses</h6>
                            <h2 class="fw-bold" th:text="${listAnalyses != null ? listAnalyses.size() : 0}">0</h2>
                        </div>
                        <i class="bi bi-microscope icon-lg"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-counter bg-danger text-white shadow">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase fw-bold small">Filtre Actuel</h6>
                            <h2 class="fw-bold" th:text="${currentStatut}">...</h2>
                        </div>
                        <i class="bi bi-funnel icon-lg"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-counter bg-info text-white shadow">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase fw-bold small">Page Actuelle</h6>
                            <h2 class="fw-bold" th:text="${currentPage + 1}">1</h2>
                        </div>
                        <i class="bi bi-file-earmark-text icon-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0 fw-light"><i class="bi bi-list-task"></i> Worklist des Examens</h4>
                <div class="btn-group shadow-sm">
                    <a th:href="@{/labo/analyses(statut='DEMANDE')}" 
                       class="btn btn-sm" th:classappend="${currentStatut=='DEMANDE' ? 'btn-warning text-dark fw-bold' : 'btn-outline-light'}">
                       <i class="bi bi-hourglass-split"></i> À traiter
                    </a>
                    <a th:href="@{/labo/analyses(statut='TERMINE')}" 
                       class="btn btn-sm" th:classappend="${currentStatut=='TERMINE' ? 'btn-success fw-bold' : 'btn-outline-light'}">
                       <i class="bi bi-check-circle"></i> Terminées
                    </a>
                </div>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/labo/analyses}" class="row g-3 mb-4">
                    <input type="hidden" name="statut" th:value="${currentStatut}">
                    <div class="col-md-6">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" class="form-control border-start-0" 
                                   placeholder="Rechercher un patient ou un examen..." th:value="${keyword}">
                            <button class="btn btn-primary px-4" type="submit">Rechercher</button>
                        </div>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border">
                        <thead class="table-light">
                        <tr>
                            <th>Patient & Dossier</th>
                            <th>Date Demande</th>
                            <th>Examens Demandés</th>
                            <th>Statut</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                            <th:block th:each="a, iterStat : ${listAnalyses}">
                                <tr th:if="${iterStat.index == 0 or a.consultation.id != listAnalyses[iterStat.index - 1].consultation.id}">
                                    <td>
                                        <div th:if="${a.consultation != null and a.consultation.rendezVous != null and a.consultation.rendezVous.patient != null}">
                                            <strong class="text-dark" th:text="${a.consultation.rendezVous.patient.nom + ' ' + a.consultation.rendezVous.patient.prenom}"></strong>
                                            <br><small class="text-muted"><i class="bi bi-hash"></i> Dossier #<span th:text="${a.consultation.id}"></span></small>
                                        </div>
                                    </td>

                                    <td>
                                        <span th:if="${a.dateDemande != null}" 
                                              th:text="${#temporals.format(a.dateDemande, 'dd/MM/yyyy HH:mm')}"></span>
                                        <span th:unless="${a.dateDemande != null}">N/A</span>
                                    </td>

                                    <td>
                                        <div class="d-flex flex-wrap gap-1">
                                            <th:block th:each="subA : ${listAnalyses}">
                                                <span th:if="${subA.consultation.id == a.consultation.id}" 
                                                      class="badge bg-primary-subtle text-primary border border-primary-subtle badge-examen p-2">
                                                    <i class="bi bi-test-tube"></i> <span th:text="${subA.typeAnalyse.nom}"></span>
                                                </span>
                                            </th:block>
                                        </div>
                                    </td>

                                    <td>
                                        <span class="badge rounded-pill px-3" 
                                              th:classappend="${a.statut == 'DEMANDE' ? 'bg-warning text-dark' : 'bg-success'}"
                                              th:text="${a.statut}"></span>
                                    </td>

                                    <td class="text-center">
                                        <a th:if="${a.statut == 'DEMANDE'}" 
                                           th:href="@{/labo/saisirResultat(id=${a.id})}" 
                                           class="btn btn-primary btn-sm rounded-pill shadow-sm px-3">
                                            <i class="bi bi-pencil-square"></i> Saisir Dossier
                                        </a>
                                        <div th:if="${a.statut == 'TERMINE'}">
                                            <span class="text-success small fw-bold"><i class="bi bi-check-all"></i> Résultats transmis</span>
                                        </div>
                                    </td>
                                </tr>
                            </th:block>
                        
                            <tr th:if="${listAnalyses == null or listAnalyses.isEmpty()}">
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                    Aucune analyse trouvée.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${pages != null and pages.length > 0}" class="mt-4">
                    <ul class="pagination pagination-sm justify-content-center">
                        <li th:each="v,itemStatus : ${pages}" class="page-item" 
                            th:classappend="${currentPage==itemStatus.index ? 'active' : ''}">
                            <a class="page-link shadow-sm" 
                               th:href="@{/labo/analyses(page=${itemStatus.index}, keyword=${keyword}, statut=${currentStatut})}"
                               th:text="${itemStatus.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

</body>
</html>
