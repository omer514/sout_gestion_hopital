<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="modal fade" id="successModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-success shadow-lg">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-check-circle"></i> Compte Patient Créé !</h5>
                </div>
                <div class="modal-body p-4">
                    <p class="text-center mb-4">Veuillez noter les accès pour le patient : <br>
                       <strong class="h5" th:text="${patientNom}"></strong></p>
                    
                    <div class="alert alert-info">
                        <div class="d-flex justify-content-between">
                            <span><i class="fas fa-user"></i> Identifiant :</span>
                            <strong th:text="${patientMatricule}"></strong>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <span><i class="fas fa-key"></i> Mot de passe :</span>
                            <strong th:text="${tempPassword}"></strong>
                        </div>
                    </div>
                    <p class="small text-danger mt-3 mb-0">
                        <i class="fas fa-exclamation-triangle"></i> Le compte sera activé après la première consultation.
                    </p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-success px-5" data-bs-dismiss="modal">J'ai bien noté les accès</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="card border-primary shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="fas fa-users-medical"></i> Répertoire des Patients</h4>
                <a th:href="@{/admin/formPatients}" sec:authorize="hasAnyAuthority('ADMIN','ACCUEIL')" class="btn btn-light btn-sm">
                    <i class="fas fa-plus-circle"></i> Nouveau Patient
                </a>
            </div>
            <div class="card-body">
                <form method="get" th:action="@{/patients}" class="row g-3 mb-4">
                    <div class="col-auto">
                        <input type="text" name="keyword" class="form-control" placeholder="Nom du patient..." th:value="${keyword}">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Filtrer</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Matricule</th><th>Nom & Prénom</th><th>Email</th><th>Téléphone</th><th>Genre</th><th>Statut</th>
                                <th sec:authorize="hasAnyAuthority('ADMIN','ACCUEIL')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p:${listPatients}">
                                <td class="fw-bold text-primary" th:text="${p.matricule != null ? p.matricule : 'Non-généré'}"></td>
                                <td th:text="${p.nom + ' ' + p.prenom}"></td>
                                <td th:text="${p.email != '' ? p.email : 'N/A'}" class="text-muted small"></td>
                                <td th:text="${p.telephone}"></td>
                                <td>
                                    <span th:if="${p.genre == 'M'}" class="badge bg-info text-dark">M</span>
                                    <span th:if="${p.genre == 'F'}" class="badge bg-danger">F</span>
                                </td>
                                <td>
                                    <span th:class="${p.active ? 'badge bg-success' : 'badge bg-warning text-dark'}" 
                                          th:text="${p.active ? 'Activé' : 'En attente'}"></span>
                                </td>
                                <td sec:authorize="hasAnyAuthority('ADMIN','ACCUEIL')">
                                    <a class="btn btn-outline-warning btn-sm" th:href="@{/admin/editPatient(id=${p.id}, keyword=${keyword}, page=${currentPage})}">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a sec:authorize="hasRole('ADMIN')" onclick="return confirm('Supprimer ce patient définitivement ?')" 
                                       class="btn btn-outline-danger btn-sm" 
                                       th:href="@{/admin/delete(id=${p.id}, keyword=${keyword}, page=${currentPage})}">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav>
                    <ul class="pagination justify-content-center">
                        <li th:each="page,status:${pages}" class="page-item">
                            <a th:class="${status.index==currentPage?'page-link active':'page-link'}"
                               th:href="@{/patients(page=${status.index}, keyword=${keyword})}"
                               th:text="${status.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:if="${showSuccessModal}">
        document.addEventListener('DOMContentLoaded', function() {
            var myModal = new bootstrap.Modal(document.getElementById('successModal'));
            myModal.show();
        });
    </script>
</body>
</html>
