<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil - Gestion Hospitalière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        .profile-header {
            background: linear-gradient(135deg, #0dcaf0 0%, #0aa2c0 100%);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 2rem;
        }
        .card-custom { 
            border-radius: 15px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background-color: white;
        }
        .info-label { color: #6c757d; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        .input-group-text { cursor: pointer; background: #f8f9fa; border-left: none; }
        .password-input { border-right: none; }
        .form-control:focus { border-color: #0dcaf0; box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25); }
        .readonly-box { background-color: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #dee2e6; color: #495057; font-weight: 500; }
        .badge-status { font-size: 0.9rem; padding: 0.6em 1.2em; border-radius: 50px; }
    </style>
</head>
<body>
<div layout:fragment="content" class="container mt-4 pb-5">
    
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8"> <div class="card card-custom mb-5">
                <div class="profile-header text-center">
                    <div class="rounded-circle bg-white text-info d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 100px; height: 100px;">
                        <i class="bi bi-person-bounding-box fs-1"></i>
                    </div>
                    <h2 class="mb-1 fw-bold" th:text="${patient.nom + ' ' + patient.prenom}">Nom Prénom</h2>
                    <p class="mb-0 opacity-75 fs-5" th:text="'Matricule : #' + ${patient.matricule}">Matricule</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <h4 class="mb-4 text-info fw-bold d-flex align-items-center">
                        <i class="bi bi-pencil-square me-2"></i> Mes Coordonnées
                    </h4>

                    <div th:if="${successInfos}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successInfos}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/patient/updateInfos}" method="post">
                        <div class="row g-4">
                           <div class="col-md-6">
                                <label class="info-label">Email / Identifiant (Non modifiable)</label>
                                <div class="readonly-box d-flex align-items-center">
                                    <i class="bi bi-envelope-at me-2 text-info"></i>
                                    <span th:text="${patient.appUser.username}">email@exemple.com</span>
                                </div>
                                <input type="hidden" name="email" th:value="${patient.appUser.username}">
                            </div>
                            <div class="col-md-6">
                                <label class="info-label">Numéro de téléphone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                    <input type="text" name="telephone" th:value="${patient.telephone}" class="form-control form-control-lg" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="info-label">Date de Naissance (Non modifiable)</label>
                                <div class="readonly-box">
                                    <i class="bi bi-calendar3 me-2 text-info"></i>
                                    <span th:text="${#dates.format(patient.dateNaissance, 'dd MMMM yyyy')}"></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="info-label">Statut du dossier</label>
                                <div class="mt-1">
                                    <span class="badge bg-success-subtle text-success border border-success badge-status">
                                        <i class="bi bi-patch-check-fill me-1"></i> Dossier Patient Actif
                                    </span>
                                </div>
                            </div>
                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-info text-white btn-lg fw-bold px-5 shadow-sm">
                                    <i class="bi bi-check2-circle me-2"></i>Enregistrer les modifications
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card card-custom border-top border-danger border-5">
                <div class="card-header bg-white p-4 border-0">
                    <h4 class="mb-0 text-danger fw-bold"><i class="bi bi-shield-lock-fill me-2"></i> Sécurité du compte</h4>
                </div>
                
                <div class="card-body p-4 p-md-5 pt-0">
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
                        <i class="bi bi-shield-check me-2"></i> <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/patient/updatePassword}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Ancien mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" name="oldPassword" class="form-control form-control-lg password-input" id="oldPwd" required>
                                <span class="input-group-text" onclick="togglePwd('oldPwd', 'eye1')">
                                    <i class="bi bi-eye-slash text-muted" id="eye1"></i>
                                </span>
                            </div>
                        </div>
                        
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nouveau mot de passe</label>
                                <div class="input-group">
                                    <input type="password" name="newPassword" class="form-control form-control-lg password-input" id="newPwd" minlength="6" required>
                                    <span class="input-group-text" onclick="togglePwd('newPwd', 'eye2')">
                                        <i class="bi bi-eye-slash text-muted" id="eye2"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Confirmer le nouveau</label>
                                <div class="input-group">
                                    <input type="password" name="confirmPassword" class="form-control form-control-lg password-input" id="confirmPwd" required>
                                    <span class="input-group-text" onclick="togglePwd('confirmPwd', 'eye3')">
                                        <i class="bi bi-eye-slash text-muted" id="eye3"></i>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-5">
                            <a th:href="@{/dashboard}" class="btn btn-link text-decoration-none text-secondary fw-bold">
                                <i class="bi bi-arrow-left"></i> Retour au tableau de bord
                            </a>
                            <button type="submit" class="btn btn-danger btn-lg fw-bold px-5 shadow-sm">
                                <i class="bi bi-lock-fill me-2"></i>Changer le mot de passe
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script layout:fragment="script">
    function togglePwd(inputId, eyeId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        
        if (input.type === "password") {
            input.type = "text";
            eye.classList.replace("bi-eye-slash", "bi-eye");
        } else {
            input.type = "password";
            eye.classList.replace("bi-eye", "bi-eye-slash");
        }
    }
</script>

</body>
</html>
