<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saisie Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">Enregistrement Patient (UC101)</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/save}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Nom</label>
                                    <input type="text" name="nom" class="form-control" th:value="${patient.nom}" placeholder="Nom de famille">
                                    <small class="text-danger" th:if="${#fields.hasErrors('patient.nom')}" th:errors="${patient.nom}"></small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Prénom</label>
                                    <input type="text" name="prenom" class="form-control" th:value="${patient.prenom}" placeholder="Prénoms">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email (Optionnel pour notifications)</label>
                                <input type="email" name="email" class="form-control" th:value="${patient.email}" placeholder="exemple@mail.com">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Date de Naissance</label>
                                    <input type="date" name="dateNaissance" class="form-control" th:value="${patient.dateNaissance}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Genre</label>
                                    <select name="genre" class="form-select">
                                        <option value="M">Masculin</option>
                                        <option value="F">Féminin</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Téléphone</label>
                                <input type="text" name="telephone" class="form-control" th:value="${patient.telephone}" placeholder="+229 ...">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Adresse Résidentielle</label>
                                <textarea name="adresse" class="form-control" rows="2" th:text="${patient.adresse}"></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Enregistrer le dossier</button>
                                <a th:href="@{/patients}" class="btn btn-outline-secondary text-center">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
