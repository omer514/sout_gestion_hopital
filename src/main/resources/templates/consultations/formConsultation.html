<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template1">
<head>
    <meta charset="UTF-8">
    <title>Interface Consultation Unique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid py-4">
        <form th:action="@{/admin/saveConsultation}" method="post">
            <input type="hidden" name="rdvId" th:value="${rdv.id}">

            <div class="row g-3">
                <div class="col-lg-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-info text-white fw-bold">
                            <i class="bi bi-person-fill"></i> Infos Patient
                        </div>
                        <div class="card-body">
                            <h5 class="text-primary" th:text="${rdv.patient.nom}"></h5>
                            <hr>
                            <div class="mb-3">
                                <label class="fw-bold small">Poids (kg)</label>
                                <input type="number" step="0.1" name="poids" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="fw-bold small">Tension (mmHg)</label>
                                <input type="text" name="tension" class="form-control" placeholder="ex: 12/8">
                            </div>
                            <div class="mb-3">
                                <label class="fw-bold small">Température (°C)</label>
                                <input type="number" step="0.1" name="temperature" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-primary text-white fw-bold">
                            <i class="bi bi-journal-medical"></i> Examen Clinique
                        </div>
                        <div class="card-body">
                            <label class="fw-bold">Observations / Symptômes</label>
                            <textarea name="rapportExamen" class="form-control mb-3" rows="8" placeholder="Décrivez l'état du patient..."></textarea>
                            
                            <label class="fw-bold text-danger">Diagnostic Final</label>
                            <textarea name="diagnostic" class="form-control border-danger" rows="3" required placeholder="Saisissez le diagnostic..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-header bg-dark text-white fw-bold">
                            <i class="bi bi-capsule"></i> Ordonnance & Analyses
                        </div>
                        <div class="card-body">
                            <h6><i class="bi bi-plus-circle"></i> Prescription</h6>
                            <select id="medSelect" class="form-select mb-3">
                                <option value="">-- Ajouter un médicament --</option>
                                <option th:each="m : ${listeMedicaments}" 
                                        th:value="${m.id}" 
                                        th:data-nom="${m.nom}" 
                                        th:text="${m.nom}"></option>
                            </select>

                            <div id="prescriptionList" class="mb-3"></div>

                            <hr>
                            <h6><i class="bi bi-flask"></i> Demande d'Analyses</h6>
                            <div class="bg-light p-2 rounded" style="max-height: 150px; overflow-y: auto; border: 1px solid #dee2e6;">
                                <div th:each="a : ${listeAnalyses}" class="form-check">
                                    <input class="form-check-input" type="checkbox" name="analyseIds" th:value="${a.id}" id="checkAnalyse" + ${a.id}>
                                    <label class="form-check-label small" th:text="${a.nom}"></label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold">
                        <i class="bi bi-check-all"></i> VALIDER TOUT
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('medSelect').addEventListener('change', function() {
            const medId = this.value;
            const medNom = this.options[this.selectedIndex].getAttribute('data-nom');
            
            if (medId) {
                const div = document.createElement('div');
                div.className = 'card p-2 mb-2 bg-light border-start border-primary border-4 shadow-sm';
                
                // Note : On a ajouté le champ name="quantites" pour correspondre au Service Java
                div.innerHTML = `
                    <div class="d-flex justify-content-between mb-1">
                        <span class="small fw-bold text-primary">${medNom}</span>
                        <button type="button" class="btn-close" style="font-size: 0.7rem" onclick="this.parentElement.parentElement.remove()"></button>
                    </div>
                    <input type="hidden" name="medicamentIds" value="${medId}">
                    <div class="row g-1">
                        <div class="col-6">
                            <input type="text" name="posologies" class="form-control form-control-sm" placeholder="Posologie" required>
                        </div>
                        <div class="col-3">
                            <input type="number" name="durees" class="form-control form-control-sm" placeholder="Jours" title="Durée" required>
                        </div>
                        <div class="col-3">
                            <input type="number" name="quantites" class="form-control form-control-sm" placeholder="Qté" title="Quantité de boites" required>
                        </div>
                    </div>`;
                
                document.getElementById('prescriptionList').appendChild(div);
                this.value = ""; // Réinitialiser le select
            }
        });
    </script>
</div>
</body>
</html>
