<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Détails du Laborantin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
        <div th:replace="~{fragments/header :: header}"></div>


<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-info text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-flask"></i> Profil du Laborantin</h4>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <img th:src="${laborantin.user != null && laborantin.user.photo != null} ? @{'/photos/' + ${laborantin.user.photo}} : @{'/photos/default.png'}" 
                                     class="rounded-circle img-thumbnail shadow-sm" 
                                     style="width: 180px; height: 180px; object-fit: cover;" alt="Photo">
                            </div>
                            
                            <div class="col-md-8">
                                <h3 class="text-info fw-bold" th:text="${laborantin.nom + ' ' + laborantin.prenom}">Nom Prénom</h3>
                                <p class="badge bg-light text-info border border-info fs-6" th:text="${laborantin.specialite}">Spécialité</p>
                                
                                <table class="table mt-3">
                                    <tr>
                                        <th style="width: 40%"><i class="bi bi-telephone text-muted me-2"></i> Téléphone :</th>
                                        <td th:text="${laborantin.telephone}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-envelope text-muted me-2"></i> Email :</th>
                                        <td th:text="${laborantin.user != null ? laborantin.user.email : 'N/A'}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-shield-check text-muted me-2"></i> Statut Compte :</th>
                                        <td>
                                            <span th:if="${laborantin.user != null}"
                                                  th:class="${laborantin.user.active ? 'badge bg-success' : 'badge bg-danger'}"
                                                  th:text="${laborantin.user.active ? 'Actif' : 'Suspendu'}"></span>
                                            <span th:if="${laborantin.user == null}" class="badge bg-secondary">Aucun compte</span>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-light d-flex justify-content-between">
                        <a th:href="@{/admin/laborantins}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <a th:href="@{/admin/editLaborantin(id=${laborantin.id})}" class="btn btn-warning">
                            <i class="bi bi-pencil"></i> Modifier
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
