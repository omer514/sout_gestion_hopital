<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title th:text="${mode=='edit' ? 'Modifier Laborantin' : 'Nouveau Laborantin'}">Titre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

        <div th:replace="~{fragments/header :: header}"></div>


<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header text-white" 
                         th:classappend="${mode=='edit' ? 'bg-warning text-dark' : 'bg-info'}">
                        <h4 class="mb-0">
                            <i th:class="${mode=='edit' ? 'bi bi-pencil-square' : 'bi bi-flask'}"></i> 
                            <span th:text="${mode=='edit' ? 'Modifier le Laborantin' : 'Ajouter un Nouveau Laborantin'}"></span>
                        </h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/admin/saveLaborantin}" method="post" enctype="multipart/form-data">
                            
                            <input type="hidden" name="id" th:value="${laborantin.id}">
                            <input type="hidden" name="mode" th:value="${mode}">

                            <h5 class="text-info border-bottom pb-2 mb-3">Informations Professionnelles</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nom</label>
                                    <input type="text" name="nom" class="form-control" 
                                           placeholder="Nom" th:value="${laborantin.nom}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Prénom</label>
                                    <input type="text" name="prenom" class="form-control" 
                                           placeholder="Prénom" th:value="${laborantin.prenom}" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Téléphone</label>
                                    <input type="text" name="telephone" class="form-control" 
                                           placeholder="Ex: +229..." th:value="${laborantin.telephone}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Spécialité (Unité)</label>
                                    <input type="text" name="specialite" class="form-control" 
                                           placeholder="Ex: Biochimie" th:value="${laborantin.specialite}" required>
                                </div>
                            </div>

                            <h5 class="text-info border-bottom pb-2 mb-3 mt-4">Identifiants & Photo</h5>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Photo Profile</label>
                                    <input type="file" name="imageFile" class="form-control" accept="image/*" 
                                           th:required="${mode != 'edit'}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Email (Login)</label>
                                    <input type="email" name="email" class="form-control" 
                                           placeholder="email@labo.com"
                                           th:value="${laborantin.user != null ? laborantin.user.email : ''}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Mot de passe</label>
                                    <input type="password" name="password" class="form-control" 
                                           th:required="${mode != 'edit'}" 
                                           th:placeholder="${mode == 'edit' ? 'Laisser vide si inchangé' : 'Mot de passe'}">
                                </div>
                            </div>

                            <div class="mt-4 d-flex justify-content-end">
                                <a th:href="@{/admin/laborantins}" class="btn btn-light me-2">Annuler</a>
                                <button type="submit" class="btn px-4"
                                        th:classappend="${mode=='edit' ? 'btn-warning' : 'btn-info text-white'}"
                                        th:text="${mode=='edit' ? 'Enregistrer les modifications' : 'Enregistrer le Laborantin'}">
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
