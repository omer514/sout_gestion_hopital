<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prendre Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 text-center"><i class="bi bi-clock-history"></i> Planifier une Consultation</h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-octagon-fill me-2"></i>
                            <div th:text="${error}"></div>
                        </div>

                        <form th:action="@{/admin/saveRendezVous}" method="post">
                            <div class="row mb-4">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Patient</label>
                                    <select name="patient" class="form-select" required>
                                        <option value="" disabled selected>Sélectionner le patient...</option>
                                        <option th:each="p : ${patients}" 
                                                th:value="${p.id}" 
                                                th:text="${p.nom + ' ' + p.prenom + ' (Tel: ' + p.telephone + ')'}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Médecin</label>
                                    <select name="medecin" class="form-select" required>
                                        <option value="" disabled selected>Sélectionner le médecin...</option>
                                        <option th:each="m : ${medecins}" 
                                                th:value="${m.id}" 
                                                th:text="${'Dr. ' + m.nom + ' ' + m.prenom + ' [' + m.specialite.nom + ']'}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Date du RDV</label>
                                    <input type="date" name="date" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Heure</label>
                                    <input type="time" name="heure" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Motif de consultation</label>
                                <textarea name="motif" class="form-control" rows="3" placeholder="Description sommaire..."></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-calendar-plus"></i> Enregistrer le Rendez-vous
                                </button>
                                <a th:href="@{/admin/rendezvous}" class="btn btn-outline-secondary text-center">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
