<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .badge-avalider { background-color: #fd7e14; color: #fff; } /* Orange pour "A Valider" */
        .badge-attente { background-color: #ffc107; color: #000; }
        .badge-confirme { background-color: #198754; color: #fff; }
        .badge-encours { background-color: #0dcaf0; color: #000; }
        .badge-annule { background-color: #dc3545; color: #fff; }
        .card-header { background: #212529 !important; }
        .btn-group .btn { margin-right: 2px; }
        .table-hover tbody tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    <i class="bi bi-calendar-check"></i> 
                    <span th:text="${titrePage}">Agenda</span>
                </h4>
                <a sec:authorize="hasAnyAuthority('ADMIN', 'ACCUEIL')" 
                   th:href="@{/admin/formRendezVous}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-circle"></i> Nouveau RDV
                </a>
            </div>
            
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Heure</th>
                                <th>Patient</th>
                                <th>Médecin</th>
                                <th>Statut RDV</th>
                                <th>Arrivée (Flux Accueil)</th>
                                <th>Actions (Flux Médical)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${listRDV}">
                                <td th:text="${r.date != null ? #dates.format(r.date, 'dd-MM-yyyy') : '--'}"></td>
                                <td th:text="${r.heure}"></td>
                                <td class="fw-bold" th:text="${r.patient != null ? r.patient.nom + ' ' + r.patient.prenom : 'Inconnu'}"></td>
                                <td th:text="${r.medecin != null ? 'Dr. ' + r.medecin.nom : 'Non assigné'}"></td>
                                
                                <td>
                                    <span th:if="${r.status != null}" 
                                          class="badge" 
                                          th:classappend="${#strings.toString(r.status) == 'A_VALIDER' ? 'badge-avalider' : 
                                                           (#strings.toString(r.status) == 'EN_ATTENTE' ? 'badge-attente' : 
                                                           (#strings.toString(r.status) == 'CONFIRME' ? 'badge-confirme' : 
                                                           (#strings.toString(r.status) == 'EN_COURS' ? 'badge-encours' : 'badge-annule')))}" 
                                          th:text="${#strings.toString(r.status) == 'A_VALIDER' ? 'À VALIDER' : r.status}"></span>
                                </td>
                                
                                <td>
                                    <span th:if="${#strings.toString(r.status) == 'A_VALIDER'}" class="text-muted small">
                                        <i class="bi bi-hourglass-split"></i> Attente médecin
                                    </span>

                                    <div th:if="${#strings.toString(r.status) == 'CONFIRME' or #strings.toString(r.status) == 'EN_COURS'}">
                                        <a th:if="${!r.present}" 
                                           sec:authorize="hasAnyAuthority('ADMIN', 'ACCUEIL')"
                                           th:href="@{/admin/marquerPresent(id=${r.id})}" 
                                           class="btn btn-sm btn-outline-info">
                                             <i class="bi bi-person-check"></i> Arrivé ?
                                        </a>
                                        <span th:if="${r.present}" class="badge bg-info text-dark">
                                             <i class="bi bi-check-all"></i> Présent en salle
                                        </span>
                                    </div>
                                    <span th:if="${#strings.toString(r.status) == 'ANNULE'}" class="text-danger small italic">Annulé</span>
                                </td>

                                <td class="text-center">
                                    <div class="btn-group">
                                        
                                        <div th:if="${#strings.toString(r.status) == 'A_VALIDER'}">
                                            <a sec:authorize="hasAnyAuthority('ADMIN', 'MEDECIN')"
                                               th:href="@{/medecin/accepterRDV(id=${r.id})}" 
                                               class="btn btn-success btn-sm me-1" title="Accepter">
                                                <i class="bi bi-check-lg"></i>
                                            </a>
                                            <a sec:authorize="hasAnyAuthority('ADMIN', 'MEDECIN')"
                                               th:href="@{/medecin/refuserRDV(id=${r.id})}" 
                                               class="btn btn-danger btn-sm" title="Refuser">
                                                <i class="bi bi-x-lg"></i>
                                            </a>
                                        </div>

                                        <div th:if="${r.present && (#strings.toString(r.status) == 'CONFIRME' || #strings.toString(r.status) == 'EN_COURS')}" class="d-inline">
                                            <a sec:authorize="hasAnyAuthority('ADMIN', 'MEDECIN')"
                                               th:href="@{/medecin/dossierPatient(idRDV=${r.id})}" 
                                               class="btn btn-warning btn-sm text-dark shadow-sm">
                                                 <i class="bi bi-folder2-open"></i> Dossier
                                            </a>

                                            <a sec:authorize="hasAnyAuthority('ADMIN', 'MEDECIN')"
                                               th:href="@{/admin/demarrerConsultation(id=${r.id})}" 
                                               class="btn btn-primary btn-sm shadow-sm">
                                                 <i class="bi bi-stethoscope"></i> 
                                                 <span th:text="${#strings.toString(r.status) == 'EN_COURS' ? 'Reprendre' : 'Consulter'}"></span>
                                            </a>
                                        </div>

                                        <button type="button" 
                                                th:if="${#strings.toString(r.status) != 'ANNULE' && #strings.toString(r.status) != 'EN_COURS' && #strings.toString(r.status) != 'A_VALIDER'}" 
                                                sec:authorize="hasAnyAuthority('ADMIN', 'ACCUEIL')"
                                                class="btn btn-outline-danger btn-sm"
                                                th:onclick="'ouvrirModaleAnnulation(' + ${r.id} + ')'">
                                            <i class="bi bi-x-circle"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${listRDV == null || listRDV.isEmpty()}" class="alert alert-light text-center border">
                    <i class="bi bi-info-circle"></i> Aucun rendez-vous pour le moment.
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="annulationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> Annulation de RDV</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/annulerRDV}" method="get">
                    <div class="modal-body">
                        <input type="hidden" name="id" id="rdvIdHidden">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motif de l'annulation :</label>
                            <select name="motif" class="form-select" required>
                                <option value="Médecin absent">Médecin absent</option>
                                <option value="Urgence médicale">Urgence médicale</option>
                                <option value="Patient absent">Patient absent</option>
                                <option value="Autre">Autre raison...</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                        <button type="submit" class="btn btn-danger">Confirmer l'annulation</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function ouvrirModaleAnnulation(id) {
            document.getElementById('rdvIdHidden').value = id;
            var monModal = new bootstrap.Modal(document.getElementById('annulationModal'));
            monModal.show();
        }
    </script>
</body>
</html>
