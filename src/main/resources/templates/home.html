<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Gestion Hospitalière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; }
        .main-content { margin-left: 250px; padding: 20px; }
        .nav-link { color: white; opacity: 0.8; }
        .nav-link:hover { opacity: 1; background: #34495e; }
        .nav-link.active { background: #007bff; opacity: 1; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <h3 class="text-center mb-4">Hôpital Plus</h3>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/home" class="nav-link active">Tableau de bord</a>
            </li>
            <li sec:authorize="hasAuthority('ADMIN')">
                <a href="/admin/users" class="nav-link">Gestion Personnel</a>
            </li>

            <li sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/admin/specialites}" class="nav-link">
                <i class="bi bi-star"></i> Spécialités
            </a>
        </li>

        <li sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/admin/medecins}" class="nav-link">
                <i class="bi bi-person-badge"></i> Gestion Médecins
            </a>
        </li>
        <li sec:authorize="hasAnyAuthority('ADMIN', 'ACCUEIL')">
            <a th:href="@{/admin/rendezvous}" class="nav-link">
                <i class="bi bi-calendar-check"></i> Gestion Rendez-vous
            </a>
        </li>
            
        <li>
            <a href="/patients" class="nav-link">Patients</a>
        </li>
        <li>
                <a href="/consultations" class="nav-link">Consultations</a>
        </li>
        </ul>
        <hr>
        <div class="dropdown">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger w-100">Déconnexion</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
            <div class="container-fluid">
                <span class="navbar-brand">Tableau de bord</span>
                <span class="navbar-text">
                    Connecté en tant que : <strong sec:authentication="name">Utilisateur</strong> 
                    (<span sec:authentication="principal.authorities">Roles</span>)
                </span>
            </div>
        </nav>

        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Patients du jour</h5>
                        <p class="card-text fs-2">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Consultations</h5>
                        <p class="card-text fs-2">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Alertes Stocks</h5>
                        <p class="card-text fs-2">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
