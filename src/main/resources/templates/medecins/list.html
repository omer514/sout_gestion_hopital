<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Médecins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        .user-photo {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

<div layout:fragment="content">
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-person-badge"></i> Corps Médical</h4>
                <a sec:authorize="hasAuthority('ADMIN')" class="btn btn-outline-light btn-sm" th:href="@{/admin/formMedecin}">
                    <i class="bi bi-plus-lg"></i> Nouveau Médecin
                </a>
            </div>
            <div class="card-body">
                <form method="get" th:action="@{/admin/medecins}" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="text" name="keyword" class="form-control" 
                                   placeholder="Nom ou prénom..." th:value="${keyword}">
                            <button class="btn btn-primary" type="submit">Rechercher</button>
                        </div>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Photo</th>
                            <th>Nom & Prénom</th>
                            <th>Spécialité</th>
                            <th>Téléphone</th>
                            <th>Email (Username)</th>
                            <th sec:authorize="hasAuthority('ADMIN')" class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m : ${listMedecins}">
                            <td>
                                <img th:src="${m.appUser.photo != null} ? @{'/photos/' + ${m.appUser.photo}} : @{'/photos/default.png'}" 
                                     class="user-photo shadow-sm" alt="Profile">
                            </td>
                            <td>
                                <span class="fw-bold" th:text="${m.nom + ' ' + m.prenom}"></span>
                            </td>
                            <td>
                                <span class="badge bg-primary" th:text="${m.specialite.nom}"></span>
                            </td>
                            <td th:text="${m.tel}"></td>
                            <td class="text-muted" th:text="${m.appUser.email}"></td>
                            <td sec:authorize="hasAuthority('ADMIN')" class="text-center">
                                <div class="btn-group">
                                    <a th:href="@{/admin/medecinDetails(id=${m.id})}" class="btn btn-outline-info btn-sm">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/admin/editMedecin(id=${m.id})}" class="btn btn-outline-warning btn-sm">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a onclick="return confirm('Voulez-vous vraiment supprimer ce médecin et son compte accès ?')" 
                                       th:href="@{/admin/deleteMedecin(id=${m.id}, page=${currentPage}, keyword=${keyword})}" 
                                       class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav>
                    <ul class="pagination justify-content-center">
                        <li th:each="v,itemStatus : ${pages}" class="page-item" 
                            th:classappend="${currentPage==itemStatus.index ? 'active' : ''}">
                            <a class="page-link" 
                               th:href="@{/admin/medecins(page=${itemStatus.index}, keyword=${keyword})}"
                               th:text="${itemStatus.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
