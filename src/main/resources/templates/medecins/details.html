<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails du Médecin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>

        <div th:replace="~{fragments/header :: header}"></div>

<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-info-circle"></i> Profil du Médecin</h4>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <img th:src="${medecin.appUser.photo != null} ? @{'/photos/' + ${medecin.appUser.photo}} : @{'/photos/default.png'}" 
                                     class="rounded-circle img-thumbnail shadow-sm" 
                                     style="width: 180px; height: 180px; object-fit: cover;" alt="Photo">
                            </div>
                            
                            <div class="col-md-8">
                                <h3 class="text-primary fw-bold" th:text="${'Dr. ' + medecin.nom + ' ' + medecin.prenom}">Nom Prénom</h3>
                                <p class="badge bg-info text-dark fs-6" th:text="${medecin.specialite.nom}">Spécialité</p>
                                
                                <table class="table mt-3">
                                    <tr>
                                        <th><i class="bi bi-telephone text-muted me-2"></i> Téléphone :</th>
                                        <td th:text="${medecin.tel}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-envelope text-muted me-2"></i> Email :</th>
                                        <td th:text="${medecin.appUser.email}"></td>
                                    </tr>
                                    <tr>
                                        <th><i class="bi bi-check-circle text-muted me-2"></i> Statut Compte :</th>
                                        <td>
                                            <span th:class="${medecin.appUser.active ? 'text-success' : 'text-danger'}" 
                                                  th:text="${medecin.appUser.active ? 'Actif' : 'Suspendu'}"></span>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-light d-flex justify-content-between">
                        <a th:href="@{/admin/medecins}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour à la liste
                        </a>
                        <a th:href="@{/admin/editMedecin(id=${medecin.id})}" class="btn btn-warning">
                            <i class="bi bi-pencil"></i> Modifier ce profil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
