<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="template">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Laborantin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<div layout:fragment="content">
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h2 class="text-dark"><i class="bi bi-speedometer2"></i> Dashboard Laboratoire</h2>
                <p class="text-muted">Bienvenue dans votre espace de travail.</p>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-danger text-white shadow">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1">Analyses en attente</h6>
                                <h2 class="mb-0 fw-bold" th:text="${totalEnAttente}">0</h2>
                            </div>
                            <i class="bi bi-exclamation-circle fs-1 opacity-50"></i>
                        </div>
                        <a th:href="@{/labo/analyses(statut='DEMANDE')}" class="text-white mt-3 d-block small text-decoration-none">
                            Voir la liste <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
            </div>

        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-list-task"></i> Actions Rapides</h5>
            </div>
            <div class="card-body">
                <p>Cliquez sur le bouton ci-dessous pour accéder à la file d'attente des prélèvements et saisir les résultats.</p>
                <a th:href="@{/labo/analyses(statut='DEMANDE')}" class="btn btn-primary">
                    <i class="bi bi-clipboard-pulse"></i> Accéder à la Worklist
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
